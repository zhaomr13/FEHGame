name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  headless-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Download Godot 4.6.3 headless
        run: |
          curl -sL -o godot.zip https://github.com/godotengine/godot/releases/download/4.6.3-stable/Godot_v4.6.3-stable_linux.x86_64.zip
          unzip -q godot.zip
          chmod +x Godot_v4.6.3-stable_linux.x86_64

      - name: Run headless test suite
        env:
          GODOT_BIN: ${{ github.workspace }}/Godot_v4.6.3-stable_linux.x86_64
        run: tools/run_tests.sh
